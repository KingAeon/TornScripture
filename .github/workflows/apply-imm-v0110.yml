name: Apply IMM v0.11.0 category and overseas UI

on:
  push:
    paths:
      - scripts/apply_imm_v0110.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply focused patch
        run: python scripts/apply_imm_v0110.py
      - name: Validate JavaScript
        run: node --check TornScripture-Item-Market-Margin.user.js
      - name: Validate release shape
        run: |
          grep -q '@version      0.11.0' TornScripture-Item-Market-Margin.user.js
          grep -q 'catalogItemForCard' TornScripture-Item-Market-Margin.user.js
          grep -q 'IMM BEST LOAD' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-overseas-page-plan' TornScripture-Item-Market-Margin.user.js
          ! grep -q '@require' TornScripture-Item-Market-Margin.user.js
          test "$(wc -c < TornScripture-Item-Market-Margin.user.js)" -gt 200000
      - name: Commit release and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-Item-Market-Margin.user.js
          git rm -f scripts/apply_imm_v0110.py .github/workflows/apply-imm-v0110.yml
          git commit -m "Restore category badges and add overseas load UI in IMM v0.11.0"
          git push
