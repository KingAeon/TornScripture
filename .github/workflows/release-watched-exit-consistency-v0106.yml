name: Release watched exit consistency v0.10.6

on:
  push:
    paths:
      - scripts/patch_watched_exit_consistency_v0106.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply watched-exit consistency patch
        run: python3 scripts/patch_watched_exit_consistency_v0106.py
      - name: Validate JavaScript
        run: node --check TornScripture-Item-Market-Margin.user.js
      - name: Validate release markers
        run: |
          grep -q '@version      0.10.6' TornScripture-Item-Market-Margin.user.js
          grep -q 'BREAK EVEN' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-watch-best-exit-even' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-watch-best-exit-loss' TornScripture-Item-Market-Margin.user.js
          grep -q 'addProfitMarker(row, traderProfit, best.traderName)' TornScripture-Item-Market-Margin.user.js
      - name: Commit release and clean scaffolding
        run: |
          rm -f scripts/patch_watched_exit_consistency_v0106.py .github/workflows/release-watched-exit-consistency-v0106.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Use best trader payout for every watched listing row"
          git push
