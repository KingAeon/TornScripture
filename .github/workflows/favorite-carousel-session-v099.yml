name: Fix favorite carousel session storage v0.9.9

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-favorite-carousel-session-v099.py'
      - '.github/workflows/favorite-carousel-session-v099.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply focused carousel session fix
        run: python3 tools/patch-favorite-carousel-session-v099.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate hotfix markers
        run: |
          grep -q '// @version      0.9.9' TornScripture-Item-Market-Margin.user.js
          grep -q 'const loadSessionJson = (storageKey, fallback)' TornScripture-Item-Market-Margin.user.js
          grep -q 'const saveSessionJson = (storageKey, value)' TornScripture-Item-Market-Margin.user.js
          grep -q 'function renderFavoriteCaptureCarousel' TornScripture-Item-Market-Margin.user.js

      - name: Commit hotfix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix favorite carousel session storage'
          git push origin HEAD:main
