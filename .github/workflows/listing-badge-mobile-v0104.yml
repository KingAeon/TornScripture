name: Fix IMM mobile listing badges v0.10.4

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-listing-badge-mobile-v0104.py'
      - '.github/validation/listing-badge-mobile-trigger.txt'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply mobile listing badge patch
        run: python3 tools/patch-listing-badge-mobile-v0104.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate feature markers
        run: |
          grep -q '// @version      0.10.4' TornScripture-Item-Market-Margin.user.js
          grep -q 'full lot' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-listing-lot' TornScripture-Item-Market-Margin.user.js
          grep -q 'display:flex!important;position:relative;z-index:3;min-width:0;max-width:100%' TornScripture-Item-Market-Margin.user.js

      - name: Verify protected MAX logic was not modified
        run: |
          if git diff --unified=0 -- TornScripture-Item-Market-Margin.user.js | grep -E '^[+-].*(handleQuickMax|quickMaxSetInput|quickMaxMaximum|quickMaxPurchaseSurface|quickMaxConfirmationAction)'; then
            echo 'Protected MAX logic changed unexpectedly.'
            exit 1
          fi

      - name: Remove temporary patch files
        run: rm -f tools/patch-listing-badge-mobile-v0104.py .github/workflows/listing-badge-mobile-v0104.yml .github/validation/listing-badge-mobile-trigger.txt

      - name: Commit validated fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Keep listing profit badges inside the cost column'
          git push origin HEAD:main
