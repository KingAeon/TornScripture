name: Release listing cost-cell badges v0.10.7

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Preserve protected Quick MAX block
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('TornScripture-Item-Market-Margin.user.js').read_text(encoding='utf-8')
          start = text.index('  function quickMaxInteractiveLabel')
          end = text.index('  function scanListings', start)
          Path('/tmp/quickmax-before.txt').write_text(text[start:end], encoding='utf-8')
          PY
      - name: Apply patch
        run: python3 scripts/patch_listing_cost_cell_v0107.py
      - name: Validate JavaScript
        run: node --check TornScripture-Item-Market-Margin.user.js
      - name: Validate release markers
        run: |
          grep -q '@version      0.10.7' TornScripture-Item-Market-Margin.user.js
          grep -q 'function listingBadgeHost' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-listing-badge-host' TornScripture-Item-Market-Margin.user.js
          grep -q 'ea \${sign}' TornScripture-Item-Market-Margin.user.js
          grep -q 'lot \${totalSign}' TornScripture-Item-Market-Margin.user.js
      - name: Verify protected Quick MAX block unchanged
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('TornScripture-Item-Market-Margin.user.js').read_text(encoding='utf-8')
          start = text.index('  function quickMaxInteractiveLabel')
          end = text.index('  function scanListings', start)
          before = Path('/tmp/quickmax-before.txt').read_text(encoding='utf-8')
          after = text[start:end]
          if before != after:
              raise SystemExit('Protected Quick MAX block changed')
          PY
      - name: Commit release and clean scaffolding
        run: |
          rm -f scripts/patch_listing_cost_cell_v0107.py .github/workflows/release-listing-cost-cell-v0107.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Let listing badges use the full cost cell"
          git push
