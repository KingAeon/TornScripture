name: Add IMM switch-gain threshold v0.10.2

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-trade-switch-gain-v0102.py'
      - '.github/validation/trade-switch-gain-trigger.txt'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply switch-gain threshold patch
        run: python3 tools/patch-trade-switch-gain-v0102.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate feature markers
        run: |
          grep -q '// @version      0.10.2' TornScripture-Item-Market-Margin.user.js
          grep -q 'Bulk switch gain' TornScripture-Item-Market-Margin.user.js
          grep -q 'tradeExitMinimumSwitchGain' TornScripture-Item-Market-Margin.user.js
          grep -q 'CLOSE ENOUGH' TornScripture-Item-Market-Margin.user.js
          grep -q 'Ignored switch gain' TornScripture-Item-Market-Margin.user.js

      - name: Verify protected MAX logic was not modified
        run: |
          if git diff --unified=0 -- TornScripture-Item-Market-Margin.user.js | grep -E '^[+-].*(handleQuickMax|quickMaxSetInput|quickMaxMaximum|quickMaxPurchaseSurface|quickMaxConfirmationAction)'; then
            echo 'Protected MAX logic changed unexpectedly.'
            exit 1
          fi

      - name: Remove temporary patch files
        run: rm -f tools/patch-trade-switch-gain-v0102.py .github/workflows/trade-switch-gain-v0102.yml .github/validation/trade-switch-gain-trigger.txt

      - name: Commit validated feature
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show bulk switch gain and add ignore threshold'
          git push origin HEAD:main
