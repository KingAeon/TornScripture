name: Validate favorite feedback hotfix

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/patch-favorite-feedback-v021.py
      - TornScripture-IMM-Trader-Extensions.user.js

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply favorite feedback patch
        run: python tools/patch-favorite-feedback-v021.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-IMM-Trader-Extensions.user.js

      - name: Validate feedback markers
        run: |
          grep -q "@version      0.2.1" TornScripture-IMM-Trader-Extensions.user.js
          grep -q "function showFavoriteToast" TornScripture-IMM-Trader-Extensions.user.js
          grep -q "Added.*to favorites" TornScripture-IMM-Trader-Extensions.user.js

      - name: Commit validated userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-IMM-Trader-Extensions.user.js
          if git diff --cached --quiet; then
            echo "No userscript changes to commit."
          else
            git commit -m "Add favorite selection feedback"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
