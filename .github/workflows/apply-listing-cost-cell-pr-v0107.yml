name: Apply listing cost-cell badges v0.10.7 on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.head_ref, 'fix/listing-cost-cell-v0107')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect staged patch
        id: gate
        run: |
          if [ -f scripts/patch_listing_cost_cell_v0107.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Preserve protected Quick MAX block
        if: steps.gate.outputs.apply == 'true'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('TornScripture-Item-Market-Margin.user.js').read_text(encoding='utf-8')
          start = text.index('  function quickMaxInteractiveLabel')
          end = text.index('  function scanListings', start)
          Path('/tmp/quickmax-before.txt').write_text(text[start:end], encoding='utf-8')
          PY
      - name: Apply patch
        if: steps.gate.outputs.apply == 'true'
        run: python3 scripts/patch_listing_cost_cell_v0107.py
      - name: Validate JavaScript and release markers
        if: steps.gate.outputs.apply == 'true'
        run: |
          node --check TornScripture-Item-Market-Margin.user.js
          grep -q '@version      0.10.7' TornScripture-Item-Market-Margin.user.js
          grep -q 'function listingBadgeHost' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-listing-badge-host' TornScripture-Item-Market-Margin.user.js
      - name: Verify protected Quick MAX block unchanged
        if: steps.gate.outputs.apply == 'true'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('TornScripture-Item-Market-Margin.user.js').read_text(encoding='utf-8')
          start = text.index('  function quickMaxInteractiveLabel')
          end = text.index('  function scanListings', start)
          before = Path('/tmp/quickmax-before.txt').read_text(encoding='utf-8')
          after = text[start:end]
          if before != after:
              raise SystemExit('Protected Quick MAX block changed')
          PY
      - name: Commit validated branch result
        if: steps.gate.outputs.apply == 'true'
        run: |
          rm -f scripts/patch_listing_cost_cell_v0107.py
          rm -f .github/workflows/release-listing-cost-cell-v0107.yml
          rm -f .release-trigger-v0107
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Let listing badges use the full cost cell"
          git push origin HEAD:${{ github.head_ref }}
