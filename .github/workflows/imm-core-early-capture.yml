name: Patch IMM core early capture

on:
  push:
    branches:
      - agent/imm-core-early-capture-v0.9.2
    paths:
      - tools/patch-imm-core-early-capture.py
      - .github/workflows/imm-core-early-capture.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/imm-core-early-capture-v0.9.2
          fetch-depth: 0

      - name: Patch core userscript
        run: python tools/patch-imm-core-early-capture.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Commit validated userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-Item-Market-Margin.user.js
          if git diff --cached --quiet; then
            echo "No userscript changes to commit."
          else
            git commit -m "Integrate early capture return into IMM core"
            git push origin HEAD:agent/imm-core-early-capture-v0.9.2
          fi
