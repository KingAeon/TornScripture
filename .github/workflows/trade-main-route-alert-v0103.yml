name: Add IMM main trade route alert v0.10.3

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-trade-main-route-alert-v0103.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply main trade route alert patch
        run: python3 tools/patch-trade-main-route-alert-v0103.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate feature markers
        run: |
          grep -q '// @version      0.10.3' TornScripture-Item-Market-Margin.user.js
          grep -q 'applyTradeExitMainPageAlert' TornScripture-Item-Market-Margin.user.js
          grep -q 'worthwhile trader switch' TornScripture-Item-Market-Margin.user.js
          grep -q 'tsimm-trade-exit-badge-major' TornScripture-Item-Market-Margin.user.js
          grep -q 'data-tsimm-trade-route-alert' TornScripture-Item-Market-Margin.user.js

      - name: Verify protected MAX logic was not modified
        run: |
          if git diff --unified=0 -- TornScripture-Item-Market-Margin.user.js | grep -E '^[+-].*(handleQuickMax|quickMaxSetInput|quickMaxMaximum|quickMaxPurchaseSurface|quickMaxConfirmationAction)'; then
            echo 'Protected MAX logic changed unexpectedly.'
            exit 1
          fi

      - name: Remove temporary patch files
        run: rm -f tools/patch-trade-main-route-alert-v0103.py .github/workflows/trade-main-route-alert-v0103.yml

      - name: Commit validated feature
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show switch gains on the main trade page'
          git push origin HEAD:main
