name: Compact IMM Trade Exit Audit v0.10.1

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-imm-trade-audit-compact-v0101.py'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply compact audit patch
        run: python3 tools/patch-imm-trade-audit-compact-v0101.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate compact audit markers
        run: |
          grep -q '// @version      0.10.1' TornScripture-Item-Market-Margin.user.js
          grep -q 'tradeExitShowAllItems' TornScripture-Item-Market-Margin.user.js
          grep -q 'function removeTradeExitItems' TornScripture-Item-Market-Margin.user.js
          grep -q 'trade-exit-remove-better' TornScripture-Item-Market-Margin.user.js
          grep -q 'overscroll-behavior:contain' TornScripture-Item-Market-Margin.user.js
          grep -q 'previousBodyScroll' TornScripture-Item-Market-Margin.user.js

      - name: Verify protected MAX implementation was not modified
        run: |
          if git diff --unified=0 -- TornScripture-Item-Market-Margin.user.js | grep -E '^[+-].*(function quickMax|function handleQuickMax|quickMaxButtonClass:|quickMaxRowClass:|data-tsimm-quick-max)'; then
            echo 'Protected MAX implementation changed unexpectedly.'
            exit 1
          fi

      - name: Remove temporary patch files
        run: rm -f tools/patch-imm-trade-audit-compact-v0101.py .github/workflows/imm-trade-audit-compact-v0101.yml

      - name: Commit validated feature
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Compact Trade Exit Audit and add bulk removal'
          git push origin HEAD:main
