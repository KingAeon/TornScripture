name: Patch Trader Extensions 0.1.7

on:
  push:
    branches:
      - dev/trader-extensions-017-auto

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: dev/trader-extensions-017-auto
          fetch-depth: 0

      - name: Apply focused patch
        run: python .github/scripts/patch_trader_extensions_017.py

      - name: Validate JavaScript
        run: node --check TornScripture-IMM-Trader-Extensions.user.js

      - name: Commit patched userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-IMM-Trader-Extensions.user.js
          git commit -m "Integrate compact tracked margins into Trader Extensions"
          git push origin HEAD:dev/trader-extensions-017-auto
