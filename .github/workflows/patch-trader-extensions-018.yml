name: Patch Trader Extensions 0.1.8

on:
  push:
    branches:
      - dev/trader-extensions-018-layout

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/trader-extensions-018-layout
          fetch-depth: 0
      - name: Apply guarded patch
        run: python .github/scripts/patch_trader_extensions_018.py
      - name: Validate userscript syntax
        run: node --check TornScripture-IMM-Trader-Extensions.user.js
      - name: Commit patched userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-IMM-Trader-Extensions.user.js
          git diff --cached --quiet && exit 0
          git commit -m "Scope tracked layout changes to active rows"
          git push origin HEAD:dev/trader-extensions-018-layout
