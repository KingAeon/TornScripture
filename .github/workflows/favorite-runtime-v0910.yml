name: Apply IMM favorite runtime v0.9.10

on:
  push:
    branches:
      - main
    paths:
      - 'tools/patch-favorite-runtime-v0910.py'
      - '.github/workflows/favorite-runtime-v0910.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply favorite runtime patch
        run: python3 tools/patch-favorite-runtime-v0910.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate runtime markers
        run: |
          grep -q '// @version      0.9.10' TornScripture-Item-Market-Margin.user.js
          grep -q 'window.__TSIMM_WATCHLIST_API__' TornScripture-Item-Market-Margin.user.js
          grep -q 'trader-toggle-favorite' TornScripture-Item-Market-Margin.user.js
          grep -q 'traders-refresh-favorites' TornScripture-Item-Market-Margin.user.js

      - name: Remove temporary patch files
        run: rm -f tools/patch-favorite-runtime-v0910.py .github/workflows/favorite-runtime-v0910.yml

      - name: Commit validated patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix favorite runtime integration'
          git push origin HEAD:main
