name: Validate IMM Trade Exit Audit v0.10.0

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/patch-trade-exit-audit-v0100.py'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out proposed change
        uses: actions/checkout@v4

      - name: Apply Trade Exit Audit patch
        run: python3 tools/patch-trade-exit-audit-v0100.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js

      - name: Validate version
        run: grep -q '// @version      0.10.0' TornScripture-Item-Market-Margin.user.js

      - name: Validate audit engine
        run: grep -q 'function buildTradeExitAudit' TornScripture-Item-Market-Margin.user.js

      - name: Validate audit UI
        run: grep -q 'function tradeExitAuditHtml' TornScripture-Item-Market-Margin.user.js

      - name: Validate verdicts
        run: |
          grep -q 'SELL HERE' TornScripture-Item-Market-Margin.user.js
          grep -q 'BETTER ELSEWHERE' TornScripture-Item-Market-Margin.user.js
          grep -q 'NPC BETTER' TornScripture-Item-Market-Margin.user.js
          grep -q 'STALE PRICE' TornScripture-Item-Market-Margin.user.js

      - name: Verify protected MAX code was not modified
        run: |
          if git diff --unified=0 -- TornScripture-Item-Market-Margin.user.js | grep -E '^[+-].*(quickMax|Quick MAX|Override MAX|handleQuickMax)'; then
            echo 'Protected MAX code changed unexpectedly.'
            exit 1
          fi
