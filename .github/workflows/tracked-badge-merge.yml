name: Patch tracked badge merge

on:
  push:
    branches:
      - agent/tracked-badge-merge-v0.1.10
    paths:
      - tools/patch-tracked-badge-merge.py
      - .github/workflows/tracked-badge-merge.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/tracked-badge-merge-v0.1.10
          fetch-depth: 0

      - name: Patch Trader Extensions
        run: python tools/patch-tracked-badge-merge.py

      - name: Validate JavaScript syntax
        run: node --check TornScripture-IMM-Trader-Extensions.user.js

      - name: Commit validated userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TornScripture-IMM-Trader-Extensions.user.js
          if git diff --cached --quiet; then
            echo "No userscript changes to commit."
          else
            git commit -m "Merge tracked exit prompts into IMM badges"
            git push origin HEAD:agent/tracked-badge-merge-v0.1.10
          fi
