name: Validate favorite capture carousel v0.9.8

on:
  pull_request:
    paths:
      - 'tools/patch-favorite-capture-carousel-v098.py'
      - 'tools/patch-favorite-carousel-layout-v098.py'
      - 'TornScripture-Item-Market-Margin.user.js'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out carousel branch
        uses: actions/checkout@v4
        with:
          ref: agent/favorite-capture-carousel-v0.9.8
          fetch-depth: 0
      - name: Apply carousel patch
        run: python3 tools/patch-favorite-capture-carousel-v098.py
      - name: Apply full-width layout
        run: python3 tools/patch-favorite-carousel-layout-v098.py
      - name: Validate JavaScript syntax
        run: node --check TornScripture-Item-Market-Margin.user.js
      - name: Validate carousel markers
        run: |
          grep -q '// @version      0.9.8' TornScripture-Item-Market-Margin.user.js
          grep -q 'function startFavoriteCaptureCarousel' TornScripture-Item-Market-Margin.user.js
          grep -q 'function continueFavoriteCaptureCarousel' TornScripture-Item-Market-Margin.user.js
          grep -q 'REFRESH FAVORITES' TornScripture-Item-Market-Margin.user.js
          grep -q 'grid-column:1/-1' TornScripture-Item-Market-Margin.user.js
      - name: Commit validated userscript
        run: |
          if git diff --quiet -- TornScripture-Item-Market-Margin.user.js; then
            echo 'No userscript changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add TornScripture-Item-Market-Margin.user.js
          git commit -m 'Add favorite trader capture carousel'
          git push origin HEAD:agent/favorite-capture-carousel-v0.9.8
