<!doctype html>
<html><head><meta charset="utf-8"><title>Item Market</title></head>
<body>
<h2>Item Market</h2>
<div id="category-grid">
  <div class="itemTile">
    <img src="https://www.torn.com/images/items/260/large.png" alt="Funeral Wreath">
    <div class="itemName">Funeral Wreath</div>
    <div class="itemPrice"><span>$251</span> <span>(122,491)</span></div>
  </div>
  <div class="itemTile">
    <img src="https://www.torn.com/images/items/183/large.png" alt="Single Red Rose">
    <div class="itemName">Single Red Rose</div>
    <div class="itemPrice"><span>$361</span> <span>(65,888)</span></div>
  </div>
</div>
<pre id="test-result">pending</pre>
<script>
localStorage.setItem('tornscripture-imm-catalog-v1', JSON.stringify({
  updatedAt: new Date().toISOString(),
  items: {
    '260': {id:260,name:'Funeral Wreath',marketPrice:300},
    '183': {id:183,name:'Single Red Rose',marketPrice:359}
  }
}));
</script>
<script src="TornScripture-Item-Market-Margin.user.js"></script>
<script>
setTimeout(() => {
  document.getElementById('test-result').textContent = JSON.stringify({
    badges: document.querySelectorAll('.tsimm-margin-badge.tsimm-badge-category').length,
    marked: document.querySelectorAll('.tsimm-category-mark').length,
    panel: document.querySelector('#tornscripture-imm-panel .tsimm-head small')?.textContent || ''
  });
}, 900);
</script>
</body></html>
